name: focusflow
description: "A production-quality offline productivity app built with Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^13.0.0

  # Notifications
  flutter_local_notifications: ^17.2.0
  timezone: ^0.9.0
  permission_handler: ^12.0.3

  # UI
  flutter_animate: ^4.2.0
  shimmer: ^3.0.0
  table_calendar: ^3.0.0
  fl_chart: ^0.65.0
  animated_text_kit: ^4.2.2
  lottie: ^3.1.0

  # Utilities
  dartz: ^0.10.1
  equatable: ^2.0.5
  intl: ^0.19.0
  uuid: ^4.3.3

  # Code Generation (runtime not needed — moved to dev)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/quotes.json
    - assets/lottie/
